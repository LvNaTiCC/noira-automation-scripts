# K8S Rollout
kubernetes_version: "1.30.0-1.1"
pod_network_cidr: "10.244.0.0/16"
service_cidr: "10.96.0.0/12"
kubernetes_repo_apt_key_url: "https://pkgs.k8s.io/core:/stable:/v1.30/deb/Release.key"
kubernetes_repo_apt_url: "https://pkgs.k8s.io/core:/stable:/v1.30/deb/"
container_runtime: "containerd"
control_plane_virtual_ip: "172.16.0.100"
k8s_api_endpoint: "k8s-api.noira.lan:1443"

# Linstor Based Storage Rollout
linstor_controller:
  - 172.16.100.1
storage_classes:
  - name: linstor-k8s-1x
    replicas: 1
    storage_pool: "lvm-thin"
  - name: linstor-k8s-2x
    replicas: 2
    storage_pool: "lvm-thin"
