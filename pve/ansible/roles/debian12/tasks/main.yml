# Clean up section in case of a previously failed playbook run, to reduce manual intervention and reboots.
###
- name: Clean up binds
  tags: partitioning
  ansible.builtin.shell: >
    umount -l /mnt/{{ item }}
  loop: [proc, sys, dev, dev/pts, run]
  failed_when: false

- name: Clean up root mount
  tags: partitioning
  ansible.posix.mount:
    path: "/mnt"
    state: unmounted
    
- name: Overwrite system disk with zeroes
  tags: partitioning
  ansible.builtin.shell: > 
    dd if=/dev/zero of=/dev/md0 bs=1M count=513 status=progress
###

# Partitioning section
###
- name: Create system partition
  tags: partitioning
  community.general.parted:
    device: /dev/md0
    label: msdos
    number: 1
    part_start: 1GiB
    part_end: 56GiB
    state: present

- name: Create swap partition
  tags: partitioning
  community.general.parted:
    device: /dev/md0
    number: 2
    part_start: 56GiB
    part_end: 100%
    state: present

- name: Format partitions
  tags: partitioning
  ansible.builtin.shell: >
    mkfs.ext4 /dev/md0p1 && mkswap /dev/md0p2
###
# Debian 12 Install
###
- name: Mount debootstrap directory
  tags: partitioning
  ansible.builtin.shell: >
    mount /dev/md0p1 /mnt

# Courtesy of https://quantum5.ca/2024/08/12/installing-debian-proxmox-by-hand-from-rescue-environment/
- name: Run debootstrap
  tags: debootstrap
  ansible.builtin.shell: >
    debootstrap --arch amd64 bookworm /mnt http://deb.debian.org/debian

# Courtesy of https://quantum5.ca/2024/08/12/installing-debian-proxmox-by-hand-from-rescue-environment/
- name: Add repositories
  ansible.builtin.copy:
    dest: /mnt/etc/apt/sources.list
    content: |
      deb http://deb.debian.org/debian bookworm main non-free-firmware
      deb-src http://deb.debian.org/debian bookworm main non-free-firmware

      deb http://security.debian.org/debian-security bookworm-security main non-free-firmware
      deb-src http://security.debian.org/debian-security bookworm-security main non-free-firmware

      # bookworm-updates, to get updates before a point release is made;
      # see https://www.debian.org/doc/manuals/debian-reference/ch02.en.html#_updates_and_backports
      deb http://deb.debian.org/debian bookworm-updates main non-free-firmware
      deb-src http://deb.debian.org/debian bookworm-updates main non-free-firmware

- name: Create routing table for vSwitch
  ansible.builtin.lineinfile:
    path: /mnt/etc/iproute2/rt_tables
    line: "1 vswitch"
    state: present

- name: Get default gateway
  ansible.builtin.shell: >
    ip route show default | awk '/default/ {print $3; exit}'
  register: gateway_result
  changed_when: false

- name: Get root partition UUID
  ansible.builtin.shell: >
    blkid /dev/md0p1 | awk '{print $2; exit}'
  register: root_partition_uuid_result

- name: Get swap partition UUID
  ansible.builtin.shell: >
    blkid /dev/md0p2 | awk '{print $2; exit}'
  register: swap_partition_uuid_result

# With vSwitch upstream support https://docs.hetzner.com/robot/dedicated-server/network/vswitch/
- name: Configure networking
  ansible.builtin.copy:
    dest: /mnt/etc/network/interfaces
    content: |
      auto enp0s31f6.4090
      iface enp0s31f6.4090 inet manual
        vlan-raw-device enp0s31f6
        mtu 1400
      
      auto br0
      iface br0 inet static
        bridge_ports enp0s31f6.4090
        bridge_stp off
        bridge_fd 0
        address 172.16.1.{{ groups['pve-nodes'].index(inventory_hostname) + 1 }}
        netmask 255.255.0.0
        mtu 1400
        # ipv4 public subnet
        up ip addr add {{ ansible_host }}/26 dev enp0s31f6.4090
        up ip rule add from {{ ansible_host }} lookup vswitch
        up ip rule add to {{ ansible_host }} lookup vswitch
        up ip route add default via {{ gateway_result.stdout }} dev enp0s31f6.4090 table vswitch
        down ip addr del {{ ansible_host }}/26 dev enp0s31f6.4090
        down ip route del default via {{ gateway_result.stdout }} dev enp0s31f6.4090 table vswitch
        down ip rule del to {{ ansible_host }} lookup vswitch
        down ip rule del from {{ ansible_host }} lookup vswitch

# MBR-Style (No /boot mount)
- name: Configure fstab
  ansible.builtin.copy:
    dest: /mnt/etc/fstab
    content: |
      {{ root_partition_uuid_result.stdout }} / ext4 defaults 0 1
      {{ swap_partition_uuid_result }} swap swap defaults 0 0

# With vSwitch upstream support https://docs.hetzner.com/robot/dedicated-server/network/vswitch/
- name: Configure resolv.conf
  ansible.builtin.copy:
    dest: /mnt/etc/network/interfaces
    content: |
      nameserver 1.1.1.1
      nameserver 8.8.8.8
###
# Debian 12 Postinstall
###
- name: Bind virtual filesystems
  ansible.posix.mount:
    path: "/mnt/{{ item }}"
    src: "/{{ item }}"
    fstype: bind
    opts: bind
    state: mounted
  loop: [proc, sys, dev, dev/pts, run]

- name: Update package index inside chroot
  ansible.builtin.shell: >
    chroot /mnt apt update

- name: Upgrade packages inside chroot
  ansible.builtin.shell: >
    chroot /mnt apt upgrade -y

- name: Install needed packages
  ansible.builtin.shell: >
    chroot /mnt apt install -y linux-image-amd64 grub-pc wget lvm2 openssh-server mdadm

- name: Save mdadm config into newroot
  ansible.builtin.shell: >
    sudo mdadm --detail --scan | sudo tee -a /mnt/etc/mdadm/mdadm.conf

- name: Install grub to boot devices
  ansible.builtin.shell: >
    chroot /mnt grub-install /dev/nvme0n1 && chroot /mnt grub-install /dev/nvme1n1

- name: Generate grub ocnfiguration
  ansible.builtin.shell: >
    chroot /mnt update-grub

- name: Change root password
  ansible.builtin.shell: >
    echo "root:changeme" | chroot /mnt chpasswd

- name: Clean up binds
  tags: partitioning
  ansible.builtin.shell: >
    umount -l /mnt/{{ item }}
  loop: [proc, sys, dev, dev/pts, run]
  failed_when: false

- name: Clean up root mount
  tags: partitioning
  ansible.posix.mount:
    path: "/mnt"
    state: unmounted
###

