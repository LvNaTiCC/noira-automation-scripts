# Clean up section in case of a previously failed playbook run, to reduce manual intervention and reboots.
###
- name: Clean up binds
  tags: partitioning
  ansible.builtin.shell: >
    umount -l /mnt/{{ item }}
  loop: [proc, sys, dev, dev/pts, run]
  failed_when: false

- name: Clean up root mount
  tags: partitioning
  ansible.posix.mount:
    path: "/mnt"
    state: unmounted

- name: Overwrite system disk with zeroes
  tags: partitioning
  ansible.builtin.shell: > 
    dd if=/dev/zero of=/dev/md0 bs=1M count=2048 status=progress
###

# Partitioning section
###
- name: Create system partition
  tags: partitioning
  community.general.parted:
    device: /dev/md0
    label: msdos
    number: 1
    part_start: 1GiB
    part_end: 56GiB
    state: present

- name: Create swap partition
  tags: partitioning
  community.general.parted:
    device: /dev/md0
    number: 2
    part_start: 56GiB
    part_end: 100%
    state: present

- name: Installl btrfs-progs
  ansible.builtin.shell: >
    apt install -y btrfs-progs

- name: Format partitions
  tags: partitioning
  ansible.builtin.shell: >
    mkfs.btrfs -L system /dev/md0p1 && mkswap /dev/md0p2

- name: Get root partition UUID
  ansible.builtin.shell: >
    blkid /dev/md0p1 | awk '{print $2; exit}'
  register: root_partition_uuid_result

- name: Get swap partition UUID
  ansible.builtin.shell: >
    blkid /dev/md0p2 | awk '{print $2; exit}'
  register: swap_partition_uuid_result

###
# Debian 12 Install
###
- name: Mount debootstrap directory
  tags: partitioning
  ansible.builtin.shell: >
    mount -t btrfs /dev/md0p1 /mnt

- name: Create BTRFS Subvolumes
  tags: partitioning
  ansible.builtin.shell: >
    btrfs subvolume create /mnt/@

- name: Remount root partiton
  tags: partitioning
  ansible.builtin.shell: >
    umount -l /mnt && mount -o defaults,compress=zstd /dev/md0p1 /mnt

- name: Run debootstrap
  tags: debootstrap
  ansible.builtin.shell: >
    debootstrap --arch amd64 trixie /mnt http://deb.debian.org/debian

# https://manpages.debian.org/trixie/apt/sources.list.5.en.html
- name: Add repositories
  ansible.builtin.copy:
    dest: /mnt/etc/apt/sources.list.d/debian.sources
    content: |
      Types: deb
      URIs: http://deb.debian.org/debian
      Suites: trixie trixie-updates
      Components: main contrib non-free non-free-firmware
      Signed-By: /usr/share/keyrings/debian-archive-keyring.gpg
      Types: deb
      URIs: http://deb.debian.org/debian-security
      Suites: trixie-security
      Components: main contrib non-free non-free-firmware
      Signed-By: /usr/share/keyrings/debian-archive-keyring.gpg

- name: Get default gateway
  ansible.builtin.shell: >
    ip route show default | awk '/default/ {print $3; exit}'
  register: gateway_result
  changed_when: false

# According to https://docs.hetzner.com/robot/dedicated-server/network/vswitch/
- name: Create routing table for vSwitch
  ansible.builtin.lineinfile:
    path: /mnt/etc/iproute2/rt_tables
    line: "1 vswitch"
    state: present

# With vSwitch upstream support https://docs.hetzner.com/robot/dedicated-server/network/vswitch/
# Public ip is on untagged interface
- name: Configure networking
  ansible.builtin.copy:
    dest: /mnt/etc/network/interfaces
    content: |
      auto eno1
      iface eno1 inet static
        address {{ ansible_host }}
        gateway {{ gateway_result.stdout }}
        netmask 255.255.0.0

      auto eno1.4090
      iface eno1.4090 inet manual
        vlan-raw-device eno1
        mtu 1400
      
      auto br0
      iface br0 inet static
        bridge_ports eno1.4090
        bridge_stp off
        bridge_fd 0
        bridge_maxwait 0
        address 172.16.1.{{ groups['pve-nodes'].index(inventory_hostname) + 1 }}
        netmask 255.255.0.0
        mtu 1400

# MBR-Style (No /boot mount)
- name: Configure fstab
  ansible.builtin.copy:
    dest: /mnt/etc/fstab
    content: |
      {{ root_partition_uuid_result.stdout }} / ext4 defaults 0 1
      {{ swap_partition_uuid_result.stdout }} swap swap defaults 0 0

- name: Add ssh authorized_keys
  ansible.builtin.copy:
    dest: /mnt/root/.ssh/authorized_keys
    content: "{{ authorized_keys }}"

# With vSwitch upstream support https://docs.hetzner.com/robot/dedicated-server/network/vswitch/
- name: Configure resolv.conf
  ansible.builtin.copy:
    dest: /mnt/etc/resolv.conf
    content: |
      nameserver 1.1.1.1
      nameserver 8.8.8.8

- name: Configure /etc/hosts
  ansible.builtin.copy:
    dest: /mnt/etc/hosts
    content: |
      127.0.0.1       localhost
      ::1             localhost ip6-localhost ip6-loopback
      ff02::1         ip6-allnodes
      ff02::2         ip6-allrouters
      172.16.1.{{ groups['pve-nodes'].index(inventory_hostname) + 1 }}      {{ inventory_hostname }}
###
# Debian 12 Postinstall
###
- name: Bind virtual filesystems
  ansible.posix.mount:
    path: "/mnt/{{ item }}"
    src: "/{{ item }}"
    fstype: bind
    opts: bind
    state: mounted
  loop: [proc, sys, dev, dev/pts, run]

- name: Configure hostname
  ansible.builtin.shell: >
    chroot /mnt hostnamectl set-hostname {{ inventory_hostname }}

- name: Update package index inside chroot
  ansible.builtin.shell: >
    chroot /mnt apt update

- name: Upgrade packages inside chroot
  ansible.builtin.shell: >
    chroot /mnt apt upgrade -y

- name: Install needed packages
  ansible.builtin.shell: >
    chroot /mnt apt install -y linux-image-amd64 grub-pc wget lvm2 openssh-server mdadm bridge-utils vlan btrfs-progs snapper python3 python3-pip python3-venv

- name: Save mdadm config into newroot
  ansible.builtin.shell: >
    mdadm --detail --scan | tee -a /mnt/etc/mdadm/mdadm.conf

- name: Install grub to boot devices
  ansible.builtin.shell: >
    chroot /mnt grub-install /dev/nvme0n1 && chroot /mnt grub-install /dev/nvme1n1

- name: Generate grub configuration
  ansible.builtin.shell: >
    chroot /mnt update-grub

- name: Enable OpenSSH Server
  ansible.builtin.shell: >
    chroot /mnt systemctl enable ssh

- name: Change root password
  ansible.builtin.shell: >
    echo "root:changeme" | chroot /mnt chpasswd

- name: Clean up binds
  tags: postinstall_cleanup
  ansible.builtin.shell: >
    umount -l /mnt/{{ item }}
  loop: [proc, sys, dev, dev/pts, run]
  failed_when: false

- name: Clean up root mount
  tags: postinstall_cleanup
  ansible.posix.mount:
    path: "/mnt"
    state: unmounted

- name: Reboot
  ansible.builtin.reboot:
    reboot_timeout: 3600

- name: Create initial snapshot, set up snapper
  ansible.builtin.shell: >
    snapper -c root create-config / && snapper -c root create --description "Initial base snapshot" --cleanup-algorithm empty-pre-post
###

