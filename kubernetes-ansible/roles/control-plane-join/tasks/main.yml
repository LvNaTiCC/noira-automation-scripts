---
- name: Check if this control plane is already joined
  stat:
    path: /etc/kubernetes/admin.conf
  register: cp_join_check

- name: Join control plane node to cluster
  command: "{{ hostvars[groups['kube_control_plane'][0]].kubernetes_join_command }} --control-plane --apiserver-advertise-address={{ ansible_host }}"
  when: not cp_join_check.stat.exists
