# According to https://pve.proxmox.com/wiki/Install_Proxmox_VE_on_Debian_13_Trixie

- name: Ensure correct /etc/hosts
  ansible.builtin.template:
    src: templates/hosts.j2
    dest: /etc/hosts

- name: Install eatmydata for faster apt
  ansible.builtin.apt:
    state: present
    name: eatmydata

- name: Prerequisite for debian 13 specific ansible module working
  ansible.builtin.apt:
    state: present
    name: python3-debian
  environment:
    LD_PRELOAD: /usr/lib/x86_64-linux-gnu/libeatmydata.so

- name: Add PVE repository for Debian Trixie
  ansible.builtin.deb822_repository:
    name: pve_trixie_repo
    types: [deb]
    uris: http://download.proxmox.com/debian/pve
    suites: [trixie]
    components: [pve-no-subscription]
    signed_by: /usr/share/keyrings/proxmox-archive-keyring.gpg
    state: present
    enabled: true

- name: Make sure PVE enterprise repo isn't present
  ansible.builtin.deb822_repository:
    name: pve-enterprise
    types: [deb]
    uris: https://enterprise.proxmox.com/debian/pve
    suites: [trixie]
    components: [pve-enterprise]
    signed_by: /usr/share/keyrings/proxmox-archive-keyring.gpg
    state: absent

- name: Add the Proxmox VE repository keyring
  ansible.builtin.shell: |
    wget https://enterprise.proxmox.com/debian/proxmox-archive-keyring-trixie.gpg -O /usr/share/keyrings/proxmox-archive-keyring.gpg

- name: Hold grub
  ansible.builtin.dpkg_selections:
    name: grub-pc
    selection: hold

- name: Run apt update and apt upgrade
  ansible.builtin.apt:
    update_cache: true
    upgrade: full
  environment:
    LD_PRELOAD: /usr/lib/x86_64-linux-gnu/libeatmydata.so

- name: Install the Proxmox VE Kernel
  ansible.builtin.apt:
    state: present
    name:
      - proxmox-default-kernel
  environment:
    LD_PRELOAD: /usr/lib/x86_64-linux-gnu/libeatmydata.so

- name: Reboot
  ansible.builtin.reboot:
    reboot_timeout: 3600
    connect_timeout: 5
    reboot_command: "systemctl reboot -f"

- name: Install Proxmox VE Packages
  ansible.builtin.apt:
    state: present
    name:
      - proxmox-ve
      - postfix
      - open-iscsi
      - chrony
  environment:
    LD_PRELOAD: /usr/lib/x86_64-linux-gnu/libeatmydata.so

- name: Remove Debian Kernel
  ansible.builtin.shell: >
    apt purge -y --allow-remove-essential linux-image-amd64 'linux-image-6.12*' ; update-grub ; apt remove -y os-prober
  environment:
    DEBIAN_FRONTEND: noninteractive
    APT_LISTCHANGES_FRONTEND: none

- name: Configure hostname
  ansible.builtin.shell: >
    hostnamectl set-hostname {{ inventory_hostname }}

- name: Make sure PVE enterprise repo isn't present
  ansible.builtin.deb822_repository:
    name: pve-enterprise
    types: [deb]
    uris: https://enterprise.proxmox.com/debian/pve
    suites: [trixie]
    components: [pve-enterprise]
    signed_by: /usr/share/keyrings/proxmox-archive-keyring.gpg
    state: absent

- name: Reboot
  ansible.builtin.reboot:
    reboot_timeout: 3600
